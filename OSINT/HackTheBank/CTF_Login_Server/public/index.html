<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sterling River Employee Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');*/
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            min-height: 100vh;
        }
        .amex-blue {
            background-color: #004F90;
        }
        .amex-text-blue {
            color: #004F90;
        }
        .login-button {
            background-color: #004F90;
        }
        .login-button:hover {
            background-color: #003F7A;
        }

        .dashboard-card {
            background-color: white;
            padding: 3rem;
            border-radius: 1rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 90%;
            width: 600px;
            border-top: 8px solid #004F90;
        }
        .error-box {
            padding: 0.75rem;
            margin-bottom: 1rem;
            border-radius: 0.5rem;
            color: #b91c1c;
            background-color: #fee2e2;
            border: 1px solid #fca5a5;
            display: none;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

    <div id="appContainer" class="flex justify-center items-center min-h-screen w-full">
        
        <div id="loginView" class="flex flex-col md:flex-row min-h-screen w-full bg-white">
            
            <div class="hidden md:flex flex-col justify-center items-start p-16 w-3/5 amex-blue text-white shadow-xl">
                <h1 class="text-6xl font-black mb-4 tracking-tight">Sterling River Bank</h1>
                <p class="text-2xl font-light mb-8">Secure Access to Financial Intelligence</p>
                <div class="w-full h-64 rounded-xl opacity-80" style="
                    background-image: url('images/downtown.jpg'); 
                    background-size: cover; 
                    background-position: center;
                "></div>
                <p class="mt-8 text-sm opacity-70">
                    Trusted by millions. Protecting what matters most to our customers and employees.
                </p>
            </div>

            <div class="flex flex-col justify-center items-center w-full md:w-2/5 p-8 lg:p-16">
                
                <div class="w-full max-w-sm">
                    <h2 class="text-3xl font-bold mb-2 amex-text-blue">Employee Sign-In</h2>
                    <p class="text-gray-500 mb-6">Enter your Corporate Credentials to proceed.</p>

                   
                    <div id="errorMessage" class="error-box" role="alert">
                
                    </div>

                    <div class="space-y-4">
                        <div>
                            <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Employee ID / Username</label>
                            <input type="text" id="username" placeholder="username" 
                                class="w-full p-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        
                        <div>
                            <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                            <input type="password" id="password" placeholder="password" 
                                class="w-full p-3 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        
                        <button onclick="submitLogin()" class="w-full text-white font-semibold py-3 px-4 rounded-lg transition duration-150 shadow-lg transform hover:scale-[1.01] login-button">
                            Secure Log In
                        </button>
                    </div>
                </div>
            </div>
        </div>

        
        <div id="dashboardView" class="dashboard-card absolute hidden">
            <div class="flex items-center space-x-3 mb-6 pb-4 border-b border-gray-200">
                
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-green-600"><path d="M22 11.08V12a10 10 0 1 1-5.07-8.66"/><path d="M22 4L12 14.01l-3-3"/></svg>
                <h2 class="text-3xl font-bold text-gray-800">Sterling River - Access Granted</h2>
            </div>
            
            
            <div id="dashboardMessage" class="text-lg text-gray-700 leading-relaxed">
                
            </div>

            <button onclick="location.reload()" class="mt-8 bg-gray-500 text-white font-semibold py-2 px-4 rounded-lg hover:bg-gray-600 transition duration-150">
                Log Out / Reset Challenge
            </button>
        </div>

    </div>

    <script>
        
        function showDashboard(username, flag) {
            const loginView = document.getElementById('loginView');
            const dashboardView = document.getElementById('dashboardView');
            const dashboardMessage = document.getElementById('dashboardMessage');

            
            loginView.classList.add('hidden');
            dashboardView.classList.remove('hidden');

            dashboardMessage.innerHTML = `
                <p class="text-3xl font-extrabold text-green-700 mb-4">Congrats, you hacked the bank!</p>
                <p class="mb-4">Welcome, ${username}, to your employee account overview.</p>
                <div class="bg-gray-100 p-4 rounded-lg border border-gray-300">
                    <p class="text-xl font-bold text-gray-800">Account Balance: <span class="text-red-600 font-extrabold">$0.00</span></p>
                    <p class="text-lg mt-2">But hey, at least you’re rich in OSINT skills!</p>
                    <p class="text-sm font-mono mt-4 text-green-800">Flag: <span class="font-bold">${flag}</span></p>
                </div>
            `;
        }


        //function to send credentials to the server
        function submitLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorBox = document.getElementById('errorMessage');

            
            errorBox.style.display = 'none';

            // Send the username and password to the server for verification
            fetch('/api/login', { 
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ username, password }),
            })
            .then(response => {
                // The server will handle the credential check. 
                // We only proceed if we get a response.
                if (!response.ok && response.status !== 401) {
                    // Handle HTTP errors 
                    throw new Error('Server connectivity issue.');
                }
                return response.json(); // Parse the server's JSON response
            })
            .then(data => {
                
                if (data.success) {
                    
                    showDashboard(username, data.flag); 
                } else {
                    
                    errorBox.style.display = 'block';
                   
                    errorBox.textContent = data.message || `Error: Invalid credentials supplied for user '${username}'. Please try again.`;
                }
            })
            .catch(error => {
                // Catch network errors
                console.error('Login error:', error);
                errorBox.style.display = 'block';
                errorBox.textContent = 'A network error occurred. Ensure the server is running.';
            });
        }
    </script>

</body>
</html>
